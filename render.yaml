services:
  - type: web
    name: student-os-spine-api
    runtime: python
    rootDir: studentOS
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn studentOS.wsgi:application
    healthCheckPath: /api/accounts/
    envVars:
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: student-os-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: student-os-spine-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false
databases:
  - name: student-os-db
    databaseName: student_os
    user: student_os
