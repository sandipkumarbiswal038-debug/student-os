<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>StudentOS Login</title>
</head>

<body>

    <h1>StudentOS Login</h1>

    <form method="POST">

        {% csrf_token %}

        <label for="email">
            College Email
        </label>

        <br>

        <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your college email"
            required
        >

        <br><br>

        <label for="password">
            Password
        </label>

        <br>

        <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
        >

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>


    {% if error %}
        <p style="color: red;">
            {{ error }}
        </p>
    {% endif %}

</body>

</html>
